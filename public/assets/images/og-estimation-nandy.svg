<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa"/>
      <stop offset="100%" style="stop-color:#e8edf4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565C0"/>
      <stop offset="100%" style="stop-color:#1976D2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="8" fill="url(#accent)"/>

  <!-- Left decorative circle -->
  <circle cx="100" cy="80" r="200" fill="#1565C0" opacity="0.05"/>
  <circle cx="1100" cy="550" r="150" fill="#2E7D32" opacity="0.08"/>

  <!-- Logo icon -->
  <rect x="80" y="60" width="56" height="56" rx="12" fill="#1565C0"/>
  <text x="108" y="97" font-family="Arial, sans-serif" font-size="28" fill="#2E7D32" text-anchor="middle">&#9750;</text>

  <!-- Brand name -->
  <text x="150" y="90" font-family="Georgia, serif" font-size="24" font-weight="bold" fill="#1a2332">
    Estimation Immobilier
    <tspan fill="#1565C0"> Nandy</tspan>
  </text>

  <!-- Main heading -->
  <text x="600" y="260" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#1a2332" text-anchor="middle">
    Avis de Valeur Immobilier
  </text>
  <text x="600" y="330" font-family="Georgia, serif" font-size="52" font-weight="bold" fill="#1565C0" text-anchor="middle">
    Gratuit à Nandy
  </text>

  <!-- Subtitle -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="24" fill="#5a6577" text-anchor="middle">
    Estimation en 60 secondes • Données réelles du marché de Nandy
  </text>

  <!-- CTA Button -->
  <rect x="420" y="450" width="360" height="60" rx="10" fill="url(#accent)"/>
  <text x="600" y="490" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">
    Estimer gratuitement
  </text>

  <!-- Trust badges -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="18" fill="#5a6577" text-anchor="middle">
    100% Gratuit • Sans engagement • RGPD Conforme
  </text>

  <!-- Bottom accent bar -->
  <rect y="622" width="1200" height="8" fill="#2E7D32"/>
</svg>
